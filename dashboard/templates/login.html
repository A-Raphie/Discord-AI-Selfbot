<!DOCTYPE html>
<html>
<head>
    <title>Login - Raphie Bot</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, system-ui, sans-serif; background: #0f0f0f; color: #e0e0e0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; padding: 32px; width: 340px; }
        h1 { font-size: 20px; margin-bottom: 8px; color: #fff; text-align: center; }
        p { font-size: 13px; color: #888; margin-bottom: 20px; text-align: center; }
        input { width: 100%; background: #0f0f0f; border: 1px solid #333; color: #e0e0e0; padding: 10px 14px; border-radius: 6px; font-size: 14px; margin-bottom: 12px; }
        input:focus { outline: none; border-color: #555; }
        button { width: 100%; background: #2563eb; color: #fff; border: none; padding: 10px; border-radius: 6px; cursor: pointer; font-size: 14px; }
        button:hover { background: #1d4ed8; }
        .error { color: #dc2626; font-size: 13px; text-align: center; margin-bottom: 12px; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>Raphie</h1>
        <p>Enter password to continue</p>
        {% if error %}
        <div class="error">Wrong password</div>
        {% endif %}
        <form method="POST" action="/login">
            <input type="password" name="password" placeholder="Password" autofocus>
            <button type="submit">Login</button>
        </form>
    </div>
</body>
</html>
